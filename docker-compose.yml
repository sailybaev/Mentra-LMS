services:
  nginx:
    image: nginx:alpine

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./data/uploads:/data/uploads:ro
    depends_on:
      - app
      - frontend
    restart: unless-stopped

  app:
    build: ./backend
    environment:
      SERVER_PORT: '8080'
      SERVER_MODE: release
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://lms.sailybaev.kz}
      DB_DSN: postgres://lms:${POSTGRES_PASSWORD}@postgres:5432/lms?sslmode=disable
      DB_MAX_OPEN_CONNS: '25'
      DB_MAX_IDLE_CONNS: '10'
      DB_CONN_MAX_LIFETIME_MINUTES: '30'
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TOKEN_TTL_MINUTES: '15'
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
      OLLAMA_TIMEOUT_SECONDS: '270'
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD}
      UPLOAD_DIR: /app/uploads
    volumes:
      - ./data/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: https://lms.sailybaev.kz/api/v1
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: lms
      POSTGRES_USER: lms
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U lms -d lms']
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped

volumes:
  pgdata:
  ollama_models:

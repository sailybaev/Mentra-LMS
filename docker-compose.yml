services:
  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./data/uploads:/data/uploads:ro
    depends_on:
      - app
      - frontend
    restart: unless-stopped
    networks:
      - dokploy-network
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.mentra-lms.rule=Host(`lms.sailybaev.kz`)'
      - 'traefik.http.routers.mentra-lms.entrypoints=websecure'
      - 'traefik.http.routers.mentra-lms.tls.certresolver=letsencrypt'
      - 'traefik.http.services.mentra-lms.loadbalancer.server.port=80'

  app:
    build: ./backend
    env_file: ./backend/.env
    environment:
      UPLOAD_DIR: /app/uploads
    volumes:
      - ./data/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    restart: unless-stopped
    networks:
      - dokploy-network

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: https://lms.sailybaev.kz/api/v1
    restart: unless-stopped
    networks:
      - dokploy-network

  postgres:
    image: pgvector/pgvector:pg16
    env_file: ./backend/.env
    # POSTGRES_PASSWORD must be set in backend/.env
    environment:
      POSTGRES_DB: lms
      POSTGRES_USER: lms
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U lms']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - dokploy-network

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped
    networks:
      - dokploy-network

volumes:
  pgdata:
  ollama_models:

networks:
  dokploy-network:
    external: true

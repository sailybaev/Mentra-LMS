services:
  nginx:
    image: nginx:alpine
    ports:
      - "127.0.0.1:8100:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./data/uploads:/data/uploads:ro
    depends_on:
      - app
      - frontend
    restart: unless-stopped

  app:
    build: ./backend
    env_file: ./backend/.env
    environment:
      UPLOAD_DIR: /app/uploads
    volumes:
      - ./data/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: https://lms.sailybaev.kz/api/v1
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    env_file: ./backend/.env
    # POSTGRES_PASSWORD must be set in backend/.env
    environment:
      POSTGRES_DB: lms
      POSTGRES_USER: lms
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lms"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped

volumes:
  pgdata:
  ollama_models:
